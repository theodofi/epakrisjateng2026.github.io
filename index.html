<!doctype html>
<html lang="id" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laporan Penyuluhan - Bimas Kristen Jateng</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="h-full gradient-bg text-white">
    <div class="h-full w-full overflow-auto px-4 py-8">
        
        <header class="text-center mb-10 animate-fade-in">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/9/9a/Kementerian_Agama_new_logo.png/708px-Kementerian_Agama_new_logo.png" 
                 alt="Logo Kemenag" class="w-28 h-28 mx-auto mb-6 logo-glow">
            <h1 class="text-2xl md:text-4xl font-bold mb-2">Sistem Pelaporan Kegiatan<br>Penyuluh Agama Kristen</h1>
            <p class="text-blue-200">Bimas Kristen Kanwil Kemenag Provinsi Jawa Tengah</p>
            <div class="inline-block bg-yellow-500/20 text-yellow-400 px-4 py-1 rounded-full font-bold mt-4">📅 Tahun 2026</div>
        </header>

        <div class="max-w-4xl mx-auto mb-8 animate-fade-in" style="animation-delay: 0.2s;">

                <div class="flex-1 text-center md:text-left">
                    <h2 class="font-bold text-xl">Surat Tugas Penyuluh Bulanan</h2>
                    <p class="text-sm text-blue-100">Upload Surat Tugas yang berisi jadwal kegiatan bulanan Anda.</p>
                </div>
                <a href="https://forms.gle/MTEvxx94BjG7vC7i8" target="_blank" class="bg-yellow-500 hover:bg-yellow-600 text-blue-900 font-bold py-2 px-6 rounded-xl transition-transform hover:scale-105">Isi Surat Tugas</a>
            </div>
        </div>

        <div id="container-bulan" class="max-w-5xl mx-auto grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-4 md:gap-6">
            </div>

        <footer class="mt-12 text-center text-blue-300 text-sm pb-8">
            <div class="w-24 h-px bg-blue-400 mx-auto mb-4 opacity-30"></div>
            © 2026 Pembimbing Masyarakat Kristen - Kanwil Kemenag Jawa Tengah
        </footer>
    </div>
    <script src="js/script.js"></script>
